<div class="input-group">
    <label for="cipherType">Select Cipher Algorithm:</label>
    <select id="cipherType" onchange="updateUI()">
        <option value="caesar">Caesar Cipher</option>
        <option value="multiplicative">Multiplicative Cipher</option>
    </select>
</div>

<div id="caesarKeyDiv" class="input-group">
    <label for="shiftValue">Shift Value: <span id="shiftDisplay">3</span></label>
    <input type="range" id="shiftValue" min="1" max="25" value="3"> 
</div>

<div id="multiplicativeKeyDiv" class="input-group" style="display: none;">
    <label for="multiKey">Multiplicative Key:</label>
    <select id="multiKey">
        <option value="1">1</option>
        <option value="3">3</option>
        <option value="5">5</option>
        <option value="7">7</option>
        <option value="9">9</option>
        <option value="11">11</option>
        <option value="15">15</option>
        <option value="17">17</option>
        <option value="19">19</option>
        <option value="21">21</option>
        <option value="23">23</option>
        <option value="25">25</option>
    </select>
</div>
