<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caesar Cipher Pro | B.Tech Security Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Caesar Cipher Encoder/Decoder</h1>
        <p class="subtitle">Secure Network Communication Tool</p>

        <div class="card">
            <div class="toggle-group">
                <button id="encBtn" class="active" onclick="setMode('encrypt')">Encrypt</button>
                <button id="decBtn" onclick="setMode('decrypt')">Decrypt</button>
            </div>

            <label>Input Message:</label>
            <textarea id="inputText" placeholder="Type your message here..."></textarea>

            <div class="settings">
                <div class="shift-control">
                    <label>Shift Value: <span id="shiftVal">3</span></label>
                    <input type="range" id="shiftKey" min="1" max="25" value="3">
                </div>
            </div>

            <label>Result:</label>
            <textarea id="outputText" readonly placeholder="Output will appear here..."></textarea>
            
            <button onclick="copyText()" class="copy-btn">Copy Result</button>
        </div>
        
        <footer>
            <p>Computer Science Engineering | GNDEC Ludhiana</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
